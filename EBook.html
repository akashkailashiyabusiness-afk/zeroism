<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Book Hub</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root {
            --dark-bg: #121212; --dark-surface: #1e1e1e; --dark-surface-2: #2a2a2a; --dark-primary: #bb86fc; --dark-secondary: #03dac6; --dark-text: #e0e0e0; --dark-text-muted: #888; --dark-border: #333;
            --light-bg: #f5f5f5; --light-surface: #ffffff; --light-surface-2: #e0e0e0; --light-primary: #6200ee; --light-secondary: #018786; --light-text: #121212; --light-text-muted: #666; --light-border: #ddd;

            --bg-color: var(--dark-bg); --surface-color: var(--dark-surface); --surface-color-2: var(--dark-surface-2); --primary-color: var(--dark-primary); --secondary-color: var(--dark-secondary); --text-color: var(--dark-text); --text-muted-color: var(--dark-text-muted); --border-color: var(--dark-border);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }
        body.light-theme {
            --bg-color: var(--light-bg); --surface-color: var(--light-surface); --surface-color-2: var(--light-surface-2); --primary-color: var(--light-primary); --secondary-color: var(--light-secondary); --text-color: var(--light-text); --text-muted-color: var(--light-text-muted); --border-color: var(--light-border);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; transition: background-color 0.3s, color 0.3s; }
        .container { max-width: 1600px; margin: 0 auto; padding: 15px; }

        /* --- Header & Theme Toggle --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 25px; }
        header h1 { font-size: 1.8rem; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        .theme-switch-wrapper { display: flex; align-items: center; }
        .theme-switch { display: inline-block; height: 34px; position: relative; width: 60px; }
        .theme-switch input { display: none; }
        .slider { background-color: var(--surface-color-2); border: 1px solid var(--border-color); bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: #fff; bottom: 4px; content: ""; height: 26px; left: 4px; position: absolute; transition: .4s; width: 26px; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); background-color: var(--dark-surface); }
        body.light-theme input:checked + .slider:before { background-color: white; }

        /* --- Tabs & Buttons --- */
        .tabs { display: flex; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        .tab-button { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-muted-color); padding: 10px 20px; font-size: 0.9rem; cursor: pointer; border-radius: 25px; transition: all 0.3s ease; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .tab-button:hover { color: var(--primary-color); border-color: var(--primary-color); }
        .tab-button.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Forms & Controls --- */
        .search-container { margin-bottom: 30px; }
        .search-bar { display: flex; margin-bottom: 15px; }
        .search-input { flex-grow: 1; padding: 12px 15px; font-size: 1rem; border-radius: 8px 0 0 8px; border: 1px solid var(--border-color); background-color: var(--surface-color); color: var(--text-color); }
        .search-input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--primary-color-trans); }
        .search-button { padding: 0 25px; font-size: 1rem; background-color: var(--primary-color); color: #fff; border: none; border-radius: 0 8px 8px 0; cursor: pointer; transition: background-color 0.3s ease; }
        .search-filters { display: flex; gap: 15px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 0.8rem; color: var(--text-muted-color); margin-bottom: 5px; }
        .filter-select { padding: 8px 12px; font-size: 0.9rem; border-radius: 6px; border: 1px solid var(--border-color); background-color: var(--surface-color); color: var(--text-color); cursor: pointer; }

        /* --- Book Grid & Cards --- */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .book-card { background-color: var(--surface-color); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px var(--shadow-color); cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; position: relative; }
        .book-card:hover { transform: translateY(-8px); box-shadow: 0 8px 25px var(--shadow-color); }
        .book-cover-wrapper { position: relative; }
        .book-cover { width: 100%; height: 280px; object-fit: cover; background-color: var(--surface-color-2); }
        .book-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .book-title { font-size: 1rem; font-weight: 600; margin-bottom: 5px; flex-grow: 1; }
        .book-author { font-size: 0.85rem; color: var(--text-muted-color); }
        .card-icons { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 8px; }
        .card-icon-btn { background: rgba(0, 0, 0, 0.5); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; backdrop-filter: blur(2px); }
        .card-icon-btn:hover { background: rgba(0, 0, 0, 0.7); }
        .card-icon-btn.is-favorite { color: #e91e63; }
        .note-indicator { color: var(--secondary-color); font-size: 14px; }
        
        /* --- Skeleton Loader --- */
        .skeleton-card { background-color: var(--surface-color); border-radius: 12px; overflow: hidden; }
        .skeleton-cover { background-color: var(--surface-color-2); height: 280px; animation: pulse 1.5s infinite ease-in-out; }
        .skeleton-text { height: 1em; background-color: var(--surface-color-2); margin: 15px; border-radius: 4px; animation: pulse 1.5s infinite ease-in-out; }
        .skeleton-text.short { width: 60%; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- Modal --- */
        .modal { position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow-y: auto; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--surface-color); margin: auto; padding: 30px; border: 1px solid var(--border-color); width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; gap: 30px; position: relative; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-close { color: var(--text-muted-color); position: absolute; top: 15px; right: 25px; font-size: 32px; font-weight: bold; cursor: pointer; transition: color 0.3s; }
        .modal-close:hover { color: var(--primary-color); }
        .modal-cover { min-width: 220px; width: 220px; height: auto; object-fit: contain; border-radius: 10px; }
        .modal-details { flex-grow: 1; display: flex; flex-direction: column; }
        .modal-details h2 { color: var(--primary-color); margin-top: 0; line-height: 1.2; }
        .modal-details h3 { font-weight: 400; font-size: 1.2rem; margin-bottom: 15px; color: var(--text-muted-color); }
        .star-rating { color: #f39c12; margin-bottom: 15px; }
        .modal-description { margin: 15px 0; max-height: 150px; overflow-y: auto; font-size: 0.95rem; padding-right: 10px; }
        .modal-actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .modal-button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background-color: var(--primary-color); color: #fff; }
        .btn-secondary { background-color: var(--secondary-color); color: var(--dark-bg); }
        
        /* Notes Section */
        .notes-section { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .notes-section h4 { margin-bottom: 10px; }
        .notes-textarea { width: 100%; height: 80px; background: var(--surface-color-2); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; color: var(--text-color); font-family: 'Inter', sans-serif; resize: vertical; }
        
        /* Discover Tab */
        .genre-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .genre-tag { background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-color); padding: 20px; border-radius: 10px; text-align: center; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .genre-tag:hover { transform: translateY(-5px); box-shadow: 0 5px 15px var(--shadow-color); border-color: var(--primary-color); }

        /* Toasts & Footer */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
        .toast { padding: 15px 20px; border-radius: 8px; color: white; margin-top: 10px; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.2); animation: toastIn 0.5s, toastOut 0.5s 2.5s; opacity: 0; }
        .toast.success { background: #27ae60; } .toast.error { background: #c0392b; } .toast.info { background: #2980b9; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        #clear-data-btn { background: #c0392b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        /* --- Mobile Responsive (Includes 2-column grid) --- */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            header h1 { font-size: 1.5rem; }
            .book-grid {
                grid-template-columns: repeat(2, 1fr); /* <<-- 2-COLUMN MOBILE GRID -->> */
                gap: 15px;
            }
            .book-cover { height: 220px; }
            .book-title { font-size: 0.85rem; }
            .book-author { font-size: 0.75rem; }
            .card-icon-btn { width: 32px; height: 32px; font-size: 14px; }
            .modal-content { flex-direction: column; align-items: center; text-align: center; padding: 20px; }
            .modal-cover { min-width: 150px; width: 150px; }
            .search-filters { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fas fa-book-open-reader"></i> Elite Book Hub</h1>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="theme-checkbox">
                    <input type="checkbox" id="theme-checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-button active" data-tab="search"><i class="fas fa-search"></i> Finder</button>
            <button class="tab-button" data-tab="discover"><i class="fas fa-compass"></i> Discover</button>
            <button class="tab-button" data-tab="library"><i class="fas fa-swatchbook"></i> My Library</button>
        </nav>

        <main>
            <!-- Search Tab -->
            <div id="search-tab" class="tab-content active">
                <div class="search-container">
                    <div class="search-bar">
                        <input type="text" id="search-input" class="search-input" placeholder="Search for books, authors, ISBN..." required>
                        <button type="submit" class="search-button" id="search-button"><i class="fas fa-search"></i></button>
                    </div>
                    <div class="search-filters">
                        <div class="filter-group">
                            <label for="print-type-select">Print Type</label>
                            <select id="print-type-select" class="filter-select">
                                <option value="all">All</option>
                                <option value="books">Books</option>
                                <option value="magazines">Magazines</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="ebook-filter-select">eBook Availability</label>
                            <select id="ebook-filter-select" class="filter-select">
                                <option value="">All</option>
                                <option value="free-ebooks">Free eBooks</option>
                                <option value="paid-ebooks">Paid eBooks</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div id="search-results" class="book-grid">
                    <p class="message" style="grid-column: 1 / -1;">Discover your next great read. Start by searching above!</p>
                </div>
            </div>

            <!-- Discover Tab -->
            <div id="discover-tab" class="tab-content">
                <div id="genre-grid" class="genre-grid"></div>
            </div>

            <!-- Library Tab -->
            <div id="library-tab" class="tab-content">
                <div id="library-grid" class="book-grid"></div>
            </div>
        </main>
        
        <footer>
            <button id="clear-data-btn"><i class="fas fa-trash-alt"></i> Clear All My Data</button>
        </footer>
    </div>

    <!-- Modal -->
    <div id="book-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img src="" alt="Book Cover" class="modal-cover">
            <div class="modal-details">
                <div>
                    <h2 id="modal-book-title"></h2>
                    <h3 id="modal-book-author"></h3>
                    <div class="star-rating" id="modal-book-rating"></div>
                    <p class="modal-description" id="modal-book-description"></p>
                    <div class="modal-actions">
                         <button id="modal-add-to-library-btn" class="modal-button btn-secondary"><i class="fas fa-plus"></i> Add to Library</button>
                         <a id="modal-preview-btn" href="#" target="_blank" class="modal-button btn-primary"><i class="fas fa-eye"></i> Read Preview</a>
                         <button id="modal-share-btn" class="modal-button btn-primary"><i class="fas fa-share-alt"></i> Share</button>
                    </div>
                </div>
                <div class="notes-section">
                    <h4><i class="fas fa-pencil-alt"></i> My Notes</h4>
                    <textarea id="notes-textarea" class="notes-textarea" placeholder="Add your personal notes here..."></textarea>
                    <button id="save-note-btn" class="modal-button btn-secondary" style="margin-top: 10px;"><i class="fas fa-save"></i> Save Note</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>

    <script>
        const App = {
            config: {
                API_KEY: 'AIzaSyBdXb28m2xUyeADO5PfRYKl81QU4BjYGd4', // Add your key here if needed
                API_URL: 'https://www.googleapis.com/books/v1/volumes',
                RESULTS_PER_PAGE: 12,
                GENRES: ['Science Fiction', 'Fantasy', 'Mystery', 'Thriller', 'Romance', 'History', 'Biography', 'Philosophy', 'Technology', 'Cooking', 'Self-Help', 'Business'],
            },
            state: { library: [], favorites: [], notes: {}, activeTab: 'search' },

            init() {
                this.cacheDOMElements(); this.loadState(); this.bindEventListeners(); this.applyInitialTheme(); this.renderActiveTab();
            },
            cacheDOMElements() {
                this.elements = {
                    searchForm: document.querySelector('.search-bar'), searchInput: document.getElementById('search-input'), searchButton: document.getElementById('search-button'), searchResults: document.getElementById('search-results'), libraryGrid: document.getElementById('library-grid'), genreGrid: document.getElementById('genre-grid'), tabs: document.querySelectorAll('.tab-button'), tabContents: document.querySelectorAll('.tab-content'), modal: document.getElementById('book-modal'), modalClose: document.querySelector('.modal-close'),
                    modalTitle: document.getElementById('modal-book-title'), modalAuthor: document.getElementById('modal-book-author'), modalCover: document.querySelector('.modal-cover'), modalRating: document.getElementById('modal-book-rating'), modalDescription: document.getElementById('modal-book-description'), modalAddToLibraryBtn: document.getElementById('modal-add-to-library-btn'), modalPreviewBtn: document.getElementById('modal-preview-btn'), modalShareBtn: document.getElementById('modal-share-btn'),
                    notesTextarea: document.getElementById('notes-textarea'), saveNoteBtn: document.getElementById('save-note-btn'), toastContainer: document.getElementById('toast-container'), printTypeSelect: document.getElementById('print-type-select'), ebookFilterSelect: document.getElementById('ebook-filter-select'), themeToggle: document.getElementById('theme-checkbox'), clearDataBtn: document.getElementById('clear-data-btn'),
                };
            },
            loadState() {
                this.state.library = JSON.parse(localStorage.getItem('eliteBookHubLibrary')) || [];
                this.state.favorites = JSON.parse(localStorage.getItem('eliteBookHubFavorites')) || [];
                this.state.notes = JSON.parse(localStorage.getItem('eliteBookHubNotes')) || {};
            },
            saveState() {
                localStorage.setItem('eliteBookHubLibrary', JSON.stringify(this.state.library));
                localStorage.setItem('eliteBookHubFavorites', JSON.stringify(this.state.favorites));
                localStorage.setItem('eliteBookHubNotes', JSON.stringify(this.state.notes));
            },
            bindEventListeners() {
                this.elements.searchForm.addEventListener('submit', e => this.handlers.handleSearch(e));
                this.elements.searchButton.addEventListener('click', e => this.handlers.handleSearch(e));
                [this.elements.printTypeSelect, this.elements.ebookFilterSelect].forEach(el => el.addEventListener('change', e => this.handlers.handleSearch(e, true)));
                this.elements.tabs.forEach(tab => tab.addEventListener('click', e => this.handlers.handleTabClick(e)));
                document.body.addEventListener('click', e => this.handlers.handleCardClick(e));
                this.elements.modal.addEventListener('click', e => this.handlers.handleModalClick(e));
                this.elements.genreGrid.addEventListener('click', e => this.handlers.handleGenreClick(e));
                this.elements.themeToggle.addEventListener('change', () => this.handlers.handleThemeToggle());
                this.elements.clearDataBtn.addEventListener('click', () => this.handlers.handleClearData());
            },
            
            handlers: {
                handleSearch(e, isFilterChange = false) {
                    e.preventDefault();
                    const query = App.elements.searchInput.value.trim();
                    if (query || isFilterChange) App.searchBooks(query);
                },
                handleTabClick(e) {
                    const tabName = e.target.closest('.tab-button')?.dataset.tab;
                    if (tabName) { App.state.activeTab = tabName; App.renderActiveTab(); }
                },
                handleCardClick(e) {
                    const card = e.target.closest('.book-card');
                    if (!card) return;
                    const bookId = card.dataset.bookId;
                    const targetBtn = e.target.closest('.card-icon-btn');
                    if (targetBtn) { App.toggleFavorite(bookId); } else { App.showBookDetails(bookId); }
                },
                handleModalClick(e) { if (e.target === App.elements.modal || e.target === App.elements.modalClose) App.elements.modal.style.display = 'none'; },
                handleGenreClick(e) {
                    const genreTag = e.target.closest('.genre-tag');
                    if (genreTag) {
                        App.elements.searchInput.value = `subject:${genreTag.dataset.genre}`;
                        App.state.activeTab = 'search'; App.renderActiveTab(); App.searchBooks(App.elements.searchInput.value);
                    }
                },
                handleThemeToggle() {
                    document.body.classList.toggle('light-theme');
                    localStorage.setItem('eliteBookHubTheme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
                },
                handleClearData() {
                    if (confirm('Are you sure you want to delete all your saved books, favorites, and notes? This action cannot be undone.')) {
                        localStorage.removeItem('eliteBookHubLibrary'); localStorage.removeItem('eliteBookHubFavorites'); localStorage.removeItem('eliteBookHubNotes'); location.reload();
                    }
                }
            },
            
            async searchBooks(query) {
                if (!query) return;
                this.renderSkeletonLoader(this.elements.searchResults);
                const printType = this.elements.printTypeSelect.value;
                const ebookFilter = this.elements.ebookFilterSelect.value;
                let url = `${this.config.API_URL}?q=${encodeURIComponent(query)}&maxResults=${this.config.RESULTS_PER_PAGE}&key=${this.config.API_KEY}`;
                if (printType !== 'all') url += `&printType=${printType}`;
                if (ebookFilter) url += `&filter=${ebookFilter}`;
                
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    const data = await res.json();
                    if (data.items) { this.renderBooks(data.items, this.elements.searchResults); } 
                    else { this.renderMessage(this.elements.searchResults, "No books found. Try a different search."); }
                } catch (error) { console.error("Search failed:", error); this.renderMessage(this.elements.searchResults, "Failed to fetch books."); }
            },
            
            async fetchBookById(id) {
                try {
                    const res = await fetch(`${this.config.API_URL}/${id}?key=${this.config.API_KEY}`);
                    if (!res.ok) throw new Error('Book not found');
                    return await res.json();
                } catch (error) { this.showToast('Could not fetch book details.', 'error'); return null; }
            },

            toggleFavorite(bookId) {
                const index = this.state.favorites.indexOf(bookId);
                if (index > -1) { this.state.favorites.splice(index, 1); this.showToast('Removed from favorites', 'info'); } 
                else { this.state.favorites.push(bookId); this.showToast('Added to favorites!', 'success'); }
                this.saveState(); this.refreshVisibleCards();
            },
            addToLibrary(book) {
                if (this.state.library.some(b => b.id === book.id)) { this.showToast('Book is already in your library.', 'info'); return; }
                this.state.library.push(book); this.saveState(); this.showToast(`"${book.volumeInfo.title.substring(0, 20)}..." added to library!`, 'success');
                if (this.state.activeTab === 'library') this.renderLibrary();
            },
            saveNote(bookId) {
                const noteText = this.elements.notesTextarea.value;
                if(noteText) { this.state.notes[bookId] = noteText; } else { delete this.state.notes[bookId]; }
                this.saveState(); this.showToast('Note saved!', 'success'); this.refreshVisibleCards();
            },
            async shareBook(bookId, title) {
                const url = `https://books.google.com/books?id=${bookId}`;
                if (navigator.share) {
                    try { await navigator.share({ title: title, text: `Check out this book: ${title}`, url: url }); } catch(err) { console.error('Share failed:', err); }
                } else {
                    navigator.clipboard.writeText(url).then(() => this.showToast('Book link copied to clipboard!', 'info'));
                }
            },
            
            renderActiveTab() {
                this.elements.tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === this.state.activeTab));
                this.elements.tabContents.forEach(tc => tc.style.display = tc.id === `${this.state.activeTab}-tab` ? 'block' : 'none');
                if (this.state.activeTab === 'library') this.renderLibrary();
                if (this.state.activeTab === 'discover') this.renderDiscover();
            },
            renderBooks(books, container) { container.innerHTML = books.map(book => this.createBookCardHTML(book)).join(''); },
            createBookCardHTML(book) {
                const info = book.volumeInfo; const cover = info.imageLinks?.thumbnail || `https://via.placeholder.com/200x280/1e1e1e/888?text=No+Cover`; const title = info.title || "No Title"; const author = info.authors ? info.authors.join(', ') : "Unknown Author";
                const isFavorite = this.state.favorites.includes(book.id); const hasNote = !!this.state.notes[book.id];
                return `
                    <div class="book-card" data-book-id="${book.id}">
                        <div class="book-cover-wrapper">
                            <img src="${cover}" alt="Cover of ${title}" class="book-cover">
                            <div class="card-icons">
                                <button class="card-icon-btn ${isFavorite ? 'is-favorite' : ''}" title="Favorite"><i class="fas fa-heart"></i></button>
                                ${hasNote ? '<div class="card-icon-btn note-indicator" title="Has Notes"><i class="fas fa-note-sticky"></i></div>' : ''}
                            </div>
                        </div>
                        <div class="book-info">
                            <h4 class="book-title">${title.substring(0, 50)}${title.length > 50 ? '...' : ''}</h4>
                            <p class="book-author">${author}</p>
                        </div>
                    </div>`;
            },
            async showBookDetails(bookId) {
                this.elements.modal.style.display = 'flex';
                const book = await this.fetchBookById(bookId);
                if (!book) return;
                const info = book.volumeInfo;
                this.elements.modalCover.src = info.imageLinks?.thumbnail || `https://via.placeholder.com/220x330/1e1e1e/888?text=No+Cover`;
                this.elements.modalTitle.textContent = info.title || 'N/A';
                this.elements.modalAuthor.textContent = info.authors ? info.authors.join(', ') : 'N/A';
                this.elements.modalDescription.innerHTML = info.description || 'No summary available.';
                this.elements.modalRating.innerHTML = info.averageRating ? '★'.repeat(Math.round(info.averageRating)) + '☆'.repeat(5 - Math.round(info.averageRating)) : 'No rating';
                this.elements.modalPreviewBtn.style.display = info.previewLink ? 'inline-flex' : 'none';
                if (info.previewLink) this.elements.modalPreviewBtn.href = info.previewLink;
                this.elements.modalAddToLibraryBtn.onclick = () => this.addToLibrary(book);
                this.elements.notesTextarea.value = this.state.notes[bookId] || '';
                this.elements.saveNoteBtn.onclick = () => this.saveNote(bookId);
                this.elements.modalShareBtn.onclick = () => this.shareBook(bookId, info.title);
            },
            renderLibrary() {
                if (this.state.library.length > 0) { this.renderBooks(this.state.library, this.elements.libraryGrid); } 
                else { this.renderMessage(this.elements.libraryGrid, "Your library is empty. Use the Finder or Discover tab to add books!"); }
            },
            renderDiscover() { this.elements.genreGrid.innerHTML = this.config.GENRES.map(g => `<div class="genre-tag" data-genre="${g}">${g}</div>`).join(''); },
            refreshVisibleCards() {
                document.querySelectorAll('.book-card').forEach(card => {
                    const bookId = card.dataset.bookId;
                    const isFavorite = this.state.favorites.includes(bookId); const hasNote = !!this.state.notes[bookId];
                    card.querySelector('.fa-heart').parentElement.classList.toggle('is-favorite', isFavorite);
                    const noteIndicator = card.querySelector('.note-indicator');
                    if (hasNote && !noteIndicator) {
                        card.querySelector('.card-icons').innerHTML += `<div class="card-icon-btn note-indicator" title="Has Notes"><i class="fas fa-note-sticky"></i></div>`;
                    } else if (!hasNote && noteIndicator) { noteIndicator.remove(); }
                });
                if (this.state.activeTab === 'library') this.renderLibrary();
            },
            renderSkeletonLoader(container) {
                const skeletonHTML = Array.from({length: this.config.RESULTS_PER_PAGE}).map(() => `
                    <div class="skeleton-card">
                        <div class="skeleton-cover"></div>
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text short"></div>
                    </div>`).join('');
                container.innerHTML = skeletonHTML;
            },
            showToast(message, type = 'info') {
                const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.textContent = message; this.elements.toastContainer.appendChild(toast); setTimeout(() => toast.remove(), 3000);
            },
            applyInitialTheme() {
                const savedTheme = localStorage.getItem('eliteBookHubTheme');
                this.elements.themeToggle.checked = savedTheme !== 'light';
                if(savedTheme === 'light') document.body.classList.add('light-theme');
            },
            renderMessage(container, message) { container.innerHTML = `<p class="message" style="grid-column: 1 / -1;">${message}</p>`; },
        };
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
