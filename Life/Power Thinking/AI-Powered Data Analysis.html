<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced AI Data Analysis Tool - LM Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd8;
            --secondary: #764ba2;
            --accent: #f093fb;
            --light: #f8fafc;
            --dark: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --gray: #64748b;
            --light-gray: #e2e8f0;
            --border: #cbd5e1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            color: var(--dark);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        label {
            font-weight: 600;
            color: var(--dark);
        }
        
        input, select, textarea {
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-size: 1rem;
            transition: all 0.2s ease;
            background: white;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: var(--gray);
            color: white;
        }
        
        .btn-secondary:hover {
            background: #475569;
            transform: translateY(-1px);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: var(--error);
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .output-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .output-content {
            background-color: var(--light);
            padding: 20px;
            border-radius: 12px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            font-family: 'Courier New', monospace;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--error);
        }
        
        .success {
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--success);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: var(--light-gray);
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--success);
            animation: pulse 2s infinite;
        }
        
        .status-indicator.offline {
            background-color: var(--error);
            animation: none;
        }
        
        .status-indicator.connecting {
            background-color: var(--warning);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .task-history {
            margin-top: 20px;
        }
        
        .history-item {
            padding: 10px;
            border-bottom: 1px solid var(--light-gray);
            font-size: 0.9rem;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Data Analysis Tool</h1>
            <p class="subtitle">Connect to LM Studio API for automated tasks and data analysis</p>
        </header>
        
        <div class="dashboard">
            <div class="panel control-panel">
                <h2>Control Panel</h2>
                
                <div class="input-group">
                    <label for="apiEndpoint"><i class="fas fa-server"></i> API Endpoint</label>
                    <input type="text" id="apiEndpoint" value="http://localhost:1234/v1" placeholder="LM Studio API endpoint">
                </div>
                
                <div class="input-group">
                    <label for="modelSelect"><i class="fas fa-brain"></i> Model</label>
                    <select id="modelSelect">
                        <option value="">Loading models...</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="taskType"><i class="fas fa-tasks"></i> Task Type</label>
                    <select id="taskType">
                        <option value="analysis">📊 Data Analysis</option>
                        <option value="completion">✍️ Text Completion</option>
                        <option value="chat">💬 Chat Completion</option>
                        <option value="embedding">🔗 Text Embedding</option>
                        <option value="summarization">📝 Text Summarization</option>
                        <option value="translation">🌐 Translation</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="dataInput"><i class="fas fa-edit"></i> Data Input</label>
                    <textarea id="dataInput" placeholder="Paste your data here or describe the task..."></textarea>
                </div>
                
                <div class="input-group">
                    <label for="fileUpload"><i class="fas fa-upload"></i> Upload Data File</label>
                    <input type="file" id="fileUpload" accept=".csv,.json,.txt,.xlsx,.xml">
                </div>
                
                <div class="input-group">
                    <label for="temperature"><i class="fas fa-thermometer-half"></i> Temperature: <span id="tempValue">0.7</span></label>
                    <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                </div>
                
                <div class="input-group">
                    <label for="maxTokens"><i class="fas fa-coins"></i> Max Tokens</label>
                    <input type="number" id="maxTokens" value="1000" min="1" max="4000">
                </div>
                
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button id="runAnalysis" class="btn-primary"><i class="fas fa-play"></i> Run Analysis</button>
                    <button id="clearData" class="btn-secondary"><i class="fas fa-trash"></i> Clear</button>
                    <button id="saveResults" class="btn-success"><i class="fas fa-save"></i> Save</button>
                    <button id="testConnection" class="btn-secondary"><i class="fas fa-wifi"></i> Test API</button>
                </div>
            </div>
            
            <div class="panel output-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2><i class="fas fa-chart-line"></i> Analysis Results</h2>
                    <div style="display: flex; gap: 10px;">
                        <button id="copyResults" class="btn-secondary" style="padding: 8px 12px; font-size: 0.9rem;"><i class="fas fa-copy"></i></button>
                        <button id="exportResults" class="btn-secondary" style="padding: 8px 12px; font-size: 0.9rem;"><i class="fas fa-download"></i></button>
                    </div>
                </div>
                
                <div class="output-content" id="outputContent">
                    <p>Results will appear here after analysis...</p>
                </div>
                
                <div class="chart-container">
                    <canvas id="dataChart"></canvas>
                </div>
                
                <div class="status-bar">
                    <div class="api-status">
                        <div class="status-indicator" id="statusIndicator"></div>
                        <span id="statusText">Checking API connection...</span>
                    </div>
                    <div id="modelInfo">Model: Unknown</div>
                    <div id="tokenCount">Tokens: 0</div>
                </div>
            </div>
        </div>
        
        <div class="panel task-history">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2><i class="fas fa-history"></i> Task History</h2>
                <button id="clearHistory" class="btn-danger" style="padding: 6px 12px; font-size: 0.8rem;"><i class="fas fa-trash"></i> Clear</button>
            </div>
            <div id="historyList">
                <div class="history-item">No tasks run yet</div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const apiEndpointInput = document.getElementById('apiEndpoint');
        const taskTypeSelect = document.getElementById('taskType');
        const dataInputTextarea = document.getElementById('dataInput');
        const fileUploadInput = document.getElementById('fileUpload');
        const runAnalysisButton = document.getElementById('runAnalysis');
        const clearDataButton = document.getElementById('clearData');
        const outputContentDiv = document.getElementById('outputContent');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const modelInfo = document.getElementById('modelInfo');
        const historyList = document.getElementById('historyList');
        const modelSelect = document.getElementById('modelSelect');
        const temperatureSlider = document.getElementById('temperature');
        const tempValue = document.getElementById('tempValue');
        const maxTokensInput = document.getElementById('maxTokens');
        const saveResultsBtn = document.getElementById('saveResults');
        const testConnectionBtn = document.getElementById('testConnection');
        const copyResultsBtn = document.getElementById('copyResults');
        const exportResultsBtn = document.getElementById('exportResults');
        const clearHistoryBtn = document.getElementById('clearHistory');
        const tokenCount = document.getElementById('tokenCount');
        
        // Global variables
        let currentModels = [];
        let currentResults = '';
        let isProcessing = false;
        
        // Chart initialization
        const ctx = document.getElementById('dataChart').getContext('2d');
        let dataChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Analysis Results',
                    data: [],
                    backgroundColor: 'rgba(67, 97, 238, 0.5)',
                    borderColor: 'rgba(67, 97, 238, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
        
        // Check API connection on load
        document.addEventListener('DOMContentLoaded', () => {
            checkApiConnection();
            loadModels();
        });
        
        // Event listeners
        runAnalysisButton.addEventListener('click', runAnalysis);
        clearDataButton.addEventListener('click', clearData);
        fileUploadInput.addEventListener('change', handleFileUpload);
        temperatureSlider.addEventListener('input', (e) => {
            tempValue.textContent = e.target.value;
        });
        testConnectionBtn.addEventListener('click', checkApiConnection);
        saveResultsBtn.addEventListener('click', saveResults);
        copyResultsBtn.addEventListener('click', copyResults);
        exportResultsBtn.addEventListener('click', exportResults);
        clearHistoryBtn.addEventListener('click', clearHistory);
        modelSelect.addEventListener('change', updateModelInfo);
        
        // Enhanced API connection check
        async function checkApiConnection() {
            const apiEndpoint = apiEndpointInput.value.trim();
            statusIndicator.className = 'status-indicator connecting';
            statusText.textContent = "Checking API connection...";
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(`${apiEndpoint}/models`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const data = await response.json();
                    statusIndicator.className = 'status-indicator';
                    statusText.textContent = "✅ Connected to LM Studio API";
                    currentModels = data.data || [];
                    updateModelDropdown();
                    return true;
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                statusIndicator.className = 'status-indicator offline';
                if (error.name === 'AbortError') {
                    statusText.textContent = "❌ Connection timeout - Check if LM Studio is running";
                } else {
                    statusText.textContent = `❌ Connection failed: ${error.message}`;
                }
                console.error("API connection error:", error);
                return false;
            }
        }
        
        // Load and update models
        async function loadModels() {
            await checkApiConnection();
        }
        
        function updateModelDropdown() {
            modelSelect.innerHTML = '';
            if (currentModels.length === 0) {
                modelSelect.innerHTML = '<option value="">No models loaded</option>';
                modelInfo.textContent = 'Model: None loaded';
            } else {
                currentModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.id;
                    modelSelect.appendChild(option);
                });
                modelSelect.selectedIndex = 0;
                updateModelInfo();
            }
        }
        
        function updateModelInfo() {
            const selectedModel = modelSelect.value;
            modelInfo.textContent = selectedModel ? `Model: ${selectedModel}` : 'Model: None selected';
        }
        
        // Enhanced run analysis with proper error handling
        async function runAnalysis() {
            if (isProcessing) return;
            
            const apiEndpoint = apiEndpointInput.value.trim();
            const taskType = taskTypeSelect.value;
            const inputData = dataInputTextarea.value.trim();
            const selectedModel = modelSelect.value;
            const temperature = parseFloat(temperatureSlider.value);
            const maxTokens = parseInt(maxTokensInput.value);
            
            // Validation
            if (!inputData) {
                showError("Please provide some data or a task description.");
                return;
            }
            
            if (!selectedModel) {
                showError("Please select a model first. Check your API connection.");
                return;
            }
            
            isProcessing = true;
            runAnalysisButton.disabled = true;
            showLoading("Processing your request...");
            
            try {
                const startTime = Date.now();
                let response, result;
                
                const requestBody = {
                    model: selectedModel,
                    temperature: temperature,
                    max_tokens: maxTokens
                };
                
                switch(taskType) {
                    case 'analysis':
                        requestBody.messages = [
                            {
                                role: 'system',
                                content: 'You are an expert data analyst. Analyze the provided data thoroughly and return structured insights. Include key findings, patterns, statistics, and actionable recommendations. Format your response clearly with headers and bullet points.'
                            },
                            {
                                role: 'user',
                                content: `Analyze this data comprehensively: ${inputData}`
                            }
                        ];
                        response = await makeApiRequest(`${apiEndpoint}/chat/completions`, requestBody);
                        result = response.choices[0].message.content;
                        break;
                    
                    case 'summarization':
                        requestBody.messages = [
                            {
                                role: 'system',
                                content: 'You are a professional summarization assistant. Create concise, accurate summaries that capture the key points and main ideas.'
                            },
                            {
                                role: 'user',
                                content: `Summarize this text: ${inputData}`
                            }
                        ];
                        response = await makeApiRequest(`${apiEndpoint}/chat/completions`, requestBody);
                        result = response.choices[0].message.content;
                        break;
                    
                    case 'translation':
                        requestBody.messages = [
                            {
                                role: 'system',
                                content: 'You are a professional translator. Provide accurate translations while maintaining the original meaning and context.'
                            },
                            {
                                role: 'user',
                                content: `Translate this text (detect source language automatically): ${inputData}`
                            }
                        ];
                        response = await makeApiRequest(`${apiEndpoint}/chat/completions`, requestBody);
                        result = response.choices[0].message.content;
                        break;
                        
                    case 'completion':
                        requestBody.prompt = inputData;
                        response = await makeApiRequest(`${apiEndpoint}/completions`, requestBody);
                        result = response.choices[0].text;
                        break;
                        
                    case 'chat':
                        requestBody.messages = [
                            {
                                role: 'user',
                                content: inputData
                            }
                        ];
                        response = await makeApiRequest(`${apiEndpoint}/chat/completions`, requestBody);
                        result = response.choices[0].message.content;
                        break;
                        
                    case 'embedding':
                        requestBody.input = inputData;
                        response = await makeApiRequest(`${apiEndpoint}/embeddings`, requestBody);
                        displayEmbeddingResult(response.data[0].embedding);
                        return;
                }
                
                const processingTime = Date.now() - startTime;
                displayResult(result, taskType, processingTime);
                updateTokenCount(response);
                addToHistory(taskType, inputData.substring(0, 50) + '...', result.substring(0, 100) + '...');
                
            } catch (error) {
                showError(`Analysis failed: ${error.message}`);
                console.error("Analysis error:", error);
            } finally {
                isProcessing = false;
                runAnalysisButton.disabled = false;
            }
        }
        
        // Enhanced API request function
        async function makeApiRequest(url, body) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP ${response.status}: ${response.statusText}`);
                }
                
                return await response.json();
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    throw new Error('Request timeout - try reducing input size or max tokens');
                }
                throw error;
            }
        }
        
        // Enhanced display functions
        function showLoading(message) {
            outputContentDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>${message}</span>
                </div>
            `;
        }
        
        function showError(message) {
            outputContentDiv.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
        }
        
        function showSuccess(message) {
            outputContentDiv.innerHTML = `<div class="success"><i class="fas fa-check-circle"></i> ${message}</div>`;
        }
        
        function displayResult(result, taskType, processingTime) {
            currentResults = result;
            const formattedResult = formatResult(result, taskType);
            outputContentDiv.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <strong>Task:</strong> ${taskType.charAt(0).toUpperCase() + taskType.slice(1)} 
                    <span style="color: var(--gray); font-size: 0.9rem;">(${processingTime}ms)</span>
                </div>
                <div style="white-space: pre-wrap; line-height: 1.6;">${formattedResult}</div>
            `;
            
            // Try to extract numerical data for charting
            extractAndDisplayChart(result);
        }
        
        function formatResult(result, taskType) {
            // Basic markdown-like formatting
            return result
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/```([\s\S]*?)```/g, '<pre style="background: #f1f5f9; padding: 10px; border-radius: 6px; overflow-x: auto;"><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code style="background: #f1f5f9; padding: 2px 4px; border-radius: 3px;">$1</code>');
        }
        
        // Enhanced chart and visualization functions
        function extractAndDisplayChart(result) {
            const numbers = result.match(/-?\d+\.?\d*/g);
            if (numbers && numbers.length > 2) {
                const numericData = numbers.map(Number).filter(n => !isNaN(n));
                if (numericData.length > 0) {
                    dataChart.data.labels = numericData.map((_, i) => `Value ${i+1}`);
                    dataChart.data.datasets[0].data = numericData;
                    dataChart.data.datasets[0].label = 'Extracted Data';
                    dataChart.update();
                }
            }
        }
        
        function displayEmbeddingResult(embedding) {
            currentResults = `Embedding vector with ${embedding.length} dimensions`;
            outputContentDiv.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <strong>Task:</strong> Text Embedding
                </div>
                <div class="success">
                    <i class="fas fa-check-circle"></i> 
                    Generated embedding vector with ${embedding.length} dimensions
                </div>
                <div style="margin-top: 15px;">
                    <strong>Sample values (first 10):</strong><br>
                    <code style="display: block; background: #f1f5f9; padding: 10px; border-radius: 6px; margin-top: 5px;">
                        ${embedding.slice(0, 10).map(v => v.toFixed(6)).join(', ')}...
                    </code>
                </div>
            `;
            
            // Show embedding values in chart
            dataChart.data.labels = embedding.slice(0, 20).map((_, i) => `Dim ${i+1}`);
            dataChart.data.datasets[0].data = embedding.slice(0, 20);
            dataChart.data.datasets[0].label = 'Embedding Values (first 20 dimensions)';
            dataChart.update();
        }
        
        // Utility functions
        function updateTokenCount(response) {
            if (response.usage) {
                tokenCount.textContent = `Tokens: ${response.usage.total_tokens || 'N/A'}`;
            }
        }
        
        function saveResults() {
            if (!currentResults) {
                showError("No results to save");
                return;
            }
            
            const blob = new Blob([currentResults], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `analysis_results_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showSuccess("Results saved successfully!");
        }
        
        function copyResults() {
            if (!currentResults) {
                showError("No results to copy");
                return;
            }
            
            navigator.clipboard.writeText(currentResults).then(() => {
                showSuccess("Results copied to clipboard!");
            }).catch(() => {
                showError("Failed to copy results");
            });
        }
        
        function exportResults() {
            if (!currentResults) {
                showError("No results to export");
                return;
            }
            
            const exportData = {
                timestamp: new Date().toISOString(),
                task_type: taskTypeSelect.value,
                model: modelSelect.value,
                temperature: temperatureSlider.value,
                max_tokens: maxTokensInput.value,
                input: dataInputTextarea.value,
                results: currentResults
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `analysis_export_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showSuccess("Analysis exported successfully!");
        }
        
        function clearHistory() {
            historyList.innerHTML = '<div class="history-item">No tasks run yet</div>';
            showSuccess("History cleared!");
        }
        
        // Enhanced file upload with validation
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const maxSize = 5 * 1024 * 1024; // 5MB limit
            if (file.size > maxSize) {
                showError("File too large. Please select a file smaller than 5MB.");
                fileUploadInput.value = '';
                return;
            }
            
            const allowedTypes = ['text/plain', 'text/csv', 'application/json', 'text/xml'];
            if (!allowedTypes.includes(file.type) && !file.name.match(/\.(txt|csv|json|xml)$/i)) {
                showError("Unsupported file type. Please upload TXT, CSV, JSON, or XML files.");
                fileUploadInput.value = '';
                return;
            }
            
            showLoading(`Reading file: ${file.name}...`);
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let content = e.target.result;
                    
                    // Basic file processing based on type
                    if (file.name.endsWith('.json')) {
                        const jsonData = JSON.parse(content);
                        content = JSON.stringify(jsonData, null, 2);
                    } else if (file.name.endsWith('.csv')) {
                        // Add basic CSV info
                        const lines = content.split('\n');
                        content = `CSV Data (${lines.length} rows):\n${content}`;
                    }
                    
                    dataInputTextarea.value = content;
                    showSuccess(`File "${file.name}" loaded successfully (${(file.size/1024).toFixed(1)}KB)`);
                } catch (error) {
                    showError(`Error reading file: ${error.message}`);
                    fileUploadInput.value = '';
                }
            };
            
            reader.onerror = function() {
                showError("Error reading file. Please try again.");
                fileUploadInput.value = '';
            };
            
            reader.readAsText(file);
        }
        
        // Enhanced clear data function
        function clearData() {
            dataInputTextarea.value = '';
            fileUploadInput.value = '';
            currentResults = '';
            outputContentDiv.innerHTML = '<p>Results will appear here after analysis...</p>';
            dataChart.data.labels = [];
            dataChart.data.datasets[0].data = [];
            dataChart.data.datasets[0].label = 'Analysis Results';
            dataChart.update();
            tokenCount.textContent = 'Tokens: 0';
            showSuccess("Data cleared successfully!");
        }
        
        // Enhanced task history
        function addToHistory(taskType, inputPreview, resultPreview = '') {
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.style.cursor = 'pointer';
            historyItem.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>${new Date().toLocaleTimeString()}</strong> - 
                        <span style="color: var(--primary);">${taskType.charAt(0).toUpperCase() + taskType.slice(1)}</span>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--gray);"></i>
                </div>
                <div style="font-size: 0.8rem; color: var(--gray); margin-top: 4px;">
                    Input: "${inputPreview}"
                </div>
                ${resultPreview ? `<div style="font-size: 0.8rem; color: var(--success); margin-top: 2px;">Result: "${resultPreview}"</div>` : ''}
            `;
            
            // Add click handler to restore task
            historyItem.addEventListener('click', () => {
                taskTypeSelect.value = taskType;
                // Note: We don't restore full input/output to avoid overwriting current work
                showSuccess(`Task type set to: ${taskType}`);
            });
            
            if (historyList.firstChild.textContent.includes('No tasks')) {
                historyList.innerHTML = '';
            }
            
            historyList.insertBefore(historyItem, historyList.firstChild);
            
            // Limit history to 10 items
            const items = historyList.querySelectorAll('.history-item');
            if (items.length > 10) {
                historyList.removeChild(items[items.length - 1]);
            }
        }
    </script>
</body>
</html>
