<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophical Quotes</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js CDN -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* A simple font pairing for a philosophical feel */
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap');
        body { font-family: 'Lora', serif; }
        h1, button, input { font-family: 'Source Sans 3', sans-serif; }
    </style>
</head>
<body 
    class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300"
    x-data="{
        lang: 'en',
        search: '',
        quotes: [
            { en: { text: 'The unexamined life is not worth living.', author: 'Socrates' }, hi: { text: 'जिस जीवन की जांच नहीं की गई, वह जीने के लायक नहीं है।', author: 'सॉक्रेट्स' }},
            { en: { text: 'I think, therefore I am.', author: 'René Descartes' }, hi: { text: 'मैं सोचता हूँ, इसलिए मैं हूँ।', author: 'रेने डेस्कार्टेस' }},
            { en: { text: 'Man is the measure of all things.', author: 'Protagoras' }, hi: { text: 'मनुष्य सभी चीजों का माप है।', author: 'प्रोटागोरस' }},
            { en: { text: 'The only thing I know is that I know nothing.', author: 'Socrates' }, hi: { text: 'मैं केवल इतना जानता हूँ कि मैं कुछ नहीं जानता।', author: 'सॉक्रेट्स' }},
            { en: { text: 'Happiness is not an ideal of reason but of imagination.', author: 'Immanuel Kant' }, hi: { text: 'खुशी कारण का आदर्श नहीं है, बल्कि कल्पना का है।', author: 'इमैनुएल कांट' }},
            { en: { text: 'The greatest wealth is to live content with little.', author: 'Plato' }, hi: { text: 'सबसे बड़ा धन है थोड़े में संतुष्ट रहना।', author: 'प्लेटो' }},
            { en: { text: 'Life can only be understood backwards; but it must be lived forwards.', author: 'Søren Kierkegaard' }, hi: { text: 'जीवन को केवल पीछे मुड़कर समझा जा सकता है; लेकिन इसे आगे बढ़कर जीना चाहिए।', author: 'सॉरेन कीर्केगार्ड' }},
            { en: { text: 'The mind is everything. What you think you become.', author: 'Buddha' }, hi: { text: 'मन सब कुछ है। आप जो सोचते हैं, वही आप बन जाते हैं।', author: 'बुद्ध' }},
            { en: { text: 'He who has a why to live can bear almost any how.', author: 'Friedrich Nietzsche' }, hi: { text: 'जिसके पास जीने का एक कारण है, वह लगभग किसी भी तरीके को सहन कर सकता है।', author: 'फ्रेडरिक नीत्शे' }},
            { en: { text: 'The journey of a thousand miles begins with one step.', author: 'Lao Tzu' }, hi: { text: 'हजार मील की यात्रा एक कदम से शुरू होती है।', author: 'लाओ त्ज़ु' }},
            { en: { text: 'Life is really simple, but we insist on making it complicated.', author: 'Confucius' }, hi: { text: 'जीवन वास्तव में सरल है, लेकिन हम इसे जटिल बनाने पर जोर देते हैं।', author: 'कन्फ्यूशियस' }},
            { en: { text: 'The greatest glory in living lies not in never falling, but in rising every time we fall.', author: 'Nelson Mandela' }, hi: { text: 'जीवन में सबसे बड़ी महिमा कभी न गिरने में नहीं है, बल्कि हर बार गिरने पर उठने में है।', author: 'नेल्सन मंडेला' }}
        ],
        
        get filteredQuotes() {
            if (this.search.trim() === '') return this.quotes;
            const term = this.search.toLowerCase();
            return this.quotes.filter(q => 
                q.en.text.toLowerCase().includes(term) ||
                q.en.author.toLowerCase().includes(term) ||
                q.hi.text.includes(term) ||
                q.hi.author.includes(term)
            );
        },
        
        showRandom() {
            const randomIndex = Math.floor(Math.random() * this.quotes.length);
            const randomQuote = this.quotes[randomIndex];
            // Isolate the random quote by setting the search term to its full text
            this.search = randomQuote.en.text;
        }
    }"
>
    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <h1 class="text-4xl md:text-5xl font-bold text-center mb-8 text-slate-700 dark:text-slate-300" x-text="lang === 'en' ? 'Philosophical Quotes' : 'दार्शनिक उद्धरण'"></h1>

        <!-- Controls -->
        <div class="p-6 mb-10 bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm rounded-xl shadow-lg flex flex-col sm:flex-row gap-4 items-center">
            <input 
                type="text" 
                x-model.debounce.300ms="search" 
                :placeholder="lang === 'en' ? 'Search quotes or authors...' : 'उद्धरण या लेखक खोजें...'"
                class="w-full flex-grow p-3 border border-slate-300 dark:border-slate-600 rounded-full bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-purple-500 focus:outline-none transition">
            
            <div class="flex items-center gap-2">
                <!-- Language Switcher -->
                <div class="flex rounded-full bg-slate-200 dark:bg-slate-700 p-1">
                    <button @click="lang = 'en'" :class="lang === 'en' ? 'bg-purple-600 text-white' : 'text-slate-600 dark:text-slate-300'" class="px-4 py-1.5 text-sm font-semibold rounded-full transition-colors">EN</button>
                    <button @click="lang = 'hi'" :class="lang === 'hi' ? 'bg-purple-600 text-white' : 'text-slate-600 dark:text-slate-300'" class="px-4 py-1.5 text-sm font-semibold rounded-full transition-colors">HI</button>
                </div>
                <!-- Random Button -->
                <button @click="showRandom()" class="px-5 py-2.5 rounded-full bg-purple-600 text-white font-semibold hover:bg-purple-700 active:scale-95 transition-all">
                    <span x-text="lang === 'en' ? 'Random' : 'यादृच्छिक'"></span>
                </button>
            </div>
        </div>

        <!-- Quote Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="quote in filteredQuotes" :key="quote.en.text">
                <div class="bg-white dark:bg-slate-800 rounded-lg shadow-md p-6 flex flex-col border-l-4 border-purple-500 hover:-translate-y-1.5 transition-transform duration-300">
                    <blockquote class="text-lg italic flex-grow mb-4" x-text="quote[lang].text"></blockquote>
                    <figcaption class="text-right font-semibold text-purple-600 dark:text-purple-400 mt-2" x-text="'— ' + quote[lang].author"></figcaption>
                </div>
            </template>
            
            <!-- No results message -->
            <div x-show="filteredQuotes.length === 0" class="md:col-span-2 lg:col-span-3 text-center py-10 text-slate-500">
                <p class="text-xl" x-text="lang === 'en' ? 'No quotes found.' : 'कोई उद्धरण नहीं मिला।'"></p>
                <button @click="search = ''" class="mt-4 text-purple-600 hover:underline" x-text="lang === 'en' ? 'Clear search' : 'खोज साफ़ करें'"></button>
            </div>
        </div>
    </main>
</body>
</html>
