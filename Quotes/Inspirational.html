<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100+ Best Inspirational Quotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #f0f4f8; /* Light blue-grey */
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #2980B9; /* A nice blue for inspiration */
            --shadow-color: rgba(0, 0, 0, 0.1);
            --font-main: 'Lato', sans-serif;
            --font-quote: 'Merriweather', serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            font-family: var(--font-quote);
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 0 auto 2.5rem auto;
            padding: 1.5rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 15px var(--shadow-color);
            max-width: 800px;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex-grow: 1;
            padding: 0.8rem 1.2rem;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            font-family: var(--font-main);
            transition: border-color 0.3s, box-shadow 0.3s;
            min-width: 250px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(41, 128, 185, 0.3);
        }

        .btn {
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 30px;
            background-color: var(--accent-color);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #3498DB; /* A lighter blue */
            transform: translateY(-2px);
        }

        .quote-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .quote-card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            border-top: 5px solid var(--accent-color);
            box-shadow: 0 6px 10px var(--shadow-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .quote-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.12);
        }

        .quote-card blockquote {
            margin: 0;
            font-family: var(--font-quote);
            font-size: 1.2rem;
            font-style: italic;
            flex-grow: 1;
            padding-bottom: 1rem;
            color: #444;
        }

        .quote-card figcaption {
            text-align: right;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 1rem;
            font-family: var(--font-main);
        }
        
        .quote-card figcaption::before {
            content: "— ";
        }
        
        .no-results {
            text-align: center;
            font-size: 1.2rem;
            color: #777;
            padding: 2rem;
            grid-column: 1 / -1; /* Span all columns */
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <main class="container">
        <h1>Inspirational Quotes</h1>
        
        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="Search for words or authors...">
            <button class="btn" id="randomBtn">Random Quote</button>
        </div>

        <section class="quote-container" id="quoteContainer"></section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // -- RAW DATA --
            const rawQuotes = [
                { text: "The only limit to our realization of tomorrow is our doubts of today.", author: "Franklin D. Roosevelt" },
                { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
                { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
                { text: "Happiness depends upon ourselves.", author: "Aristotle" },
                { text: "Your time is limited, so don’t waste it living someone else’s life.", author: "Steve Jobs" },
                { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
                { text: "Don’t watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
                { text: "The best way to predict the future is to create it.", author: "Peter Drucker" },
                { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
                { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
                { text: "The harder you work for something, the greater you'll feel when you achieve it.", author: "Unknown" },
                { text: "Don't be pushed around by the fears in your mind. Be led by the dreams in your heart.", author: "Roy T. Bennett" },
                { text: "Dream big and dare to fail.", author: "Norman Vaughan" },
                { text: "It does not matter how slowly you go, as long as you do not stop.", author: "Confucius" },
                { text: "Act as if what you do makes a difference. It does.", author: "William James" },
                { text: "Success is not how high you have climbed, but how you make a positive difference to the world.", author: "Roy T. Bennett" },
                { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
                { text: "What lies behind us and what lies before us are tiny matters compared to what lies within us.", author: "Ralph Waldo Emerson" },
                { text: "You miss 100% of the shots you don’t take.", author: "Wayne Gretzky" },
                { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
                { text: "It always seems impossible until it’s done.", author: "Nelson Mandela" },
                { text: "Keep your face always toward the sunshine—and shadows will fall behind you.", author: "Walt Whitman" },
                { text: "The only way to achieve the impossible is to believe it is possible.", author: "Charles Kingsleigh" },
                { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis" },
                { text: "Everything you’ve ever wanted is on the other side of fear.", author: "George Addair" },
                { text: "Opportunities don't happen, you create them.", author: "Chris Grosser" },
                { text: "Success usually comes to those who are too busy to be looking for it.", author: "Henry David Thoreau" },
                { text: "Don’t be afraid to give up the good to go for the great.", author: "John D. Rockefeller" },
                { text: "I find that the harder I work, the more luck I seem to have.", author: "Thomas Jefferson" },
                { text: "If you can dream it, you can do it.", author: "Walt Disney" },
                { text: "Success is walking from failure to failure with no loss of enthusiasm.", author: "Winston Churchill" },
                { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
                { text: "You must be the change you wish to see in the world.", author: "Mahatma Gandhi" },
                { text: "What we think, we become.", author: "Buddha" },
                { text: "The best revenge is massive success.", author: "Frank Sinatra" },
                { text: "Your limitation—it's only your imagination.", author: "Unknown" },
                { text: "The more you give, the more you receive.", author: "Unknown" },
                { text: "Dream it. Wish it. Do it.", author: "Unknown" },
                { text: "Success is not in what you have, but who you are.", author: "Bo Bennett" },
                { text: "The only person you are destined to become is the person you decide to be.", author: "Ralph Waldo Emerson" },
                { text: "You don’t have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
                { text: "Believe in yourself and all that you are. Know that there is something inside you that is greater than any obstacle.", author: "Christian D. Larson" },
                { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
                { text: "Success is not the key to happiness. Happiness is the key to success. If you love what you are doing, you will be successful.", author: "Albert Schweitzer" },
                { text: "You are braver than you believe, stronger than you seem, and smarter than you think.", author: "A.A. Milne" },
                { text: "What we fear doing most is usually what we most need to do.", author: "Tim Ferriss" },
                { text: "The future belongs to those who prepare for it today.", author: "Malcolm X" },
                { text: "The best way to predict your future is to create it.", author: "Abraham Lincoln" },
                { text: "Success is the sum of small efforts, repeated day in and day out.", author: "Robert Collier" },
                { text: "Don’t count the days, make the days count.", author: "Muhammad Ali" },
                { text: "Push yourself, because no one else is going to do it for you.", author: "Unknown" },
                { text: "Great things never come from comfort zones.", author: "Unknown" },
                { text: "Dream bigger. Do bigger.", author: "Unknown" },
                { text: "Don’t stop when you’re tired. Stop when you’re done.", author: "Unknown" },
                { text: "Wake up with determination. Go to bed with satisfaction.", author: "Unknown" },
                { text: "Do something today that your future self will thank you for.", author: "Unknown" },
                { text: "Little things make big days.", author: "Unknown" },
                { text: "It’s going to be hard, but hard does not mean impossible.", author: "Unknown" },
                { text: "Don’t wait for opportunity. Create it.", author: "Unknown" },
                { text: "Sometimes we’re tested not to show our weaknesses, but to discover our strengths.", author: "Unknown" },
                { text: "The key to success is to focus on goals, not obstacles.", author: "Unknown" },
                { text: "Success doesn’t just find you. You have to go out and get it.", author: "Unknown" },
                { text: "Success is not for the lazy.", author: "Unknown" },
            ];

            // -- DATA CLEANUP (Remove Duplicates) --
            const uniqueQuotes = Array.from(new Map(rawQuotes.map(q => [q.text, q])).values());

            // -- DOM ELEMENTS --
            const quoteContainer = document.getElementById('quoteContainer');
            const searchInput = document.getElementById('searchInput');
            const randomBtn = document.getElementById('randomBtn');
            
            // -- FUNCTIONS --
            const renderQuotes = (quotesToRender) => {
                quoteContainer.innerHTML = '';
                if (quotesToRender.length === 0) {
                    quoteContainer.innerHTML = `<p class="no-results">No quotes found matching your search.</p>`;
                    return;
                }

                quotesToRender.forEach(quote => {
                    const card = document.createElement('article');
                    card.className = 'quote-card';
                    card.innerHTML = `
                        <figure>
                            <blockquote>${quote.text}</blockquote>
                            <figcaption>${quote.author}</figcaption>
                        </figure>
                    `;
                    quoteContainer.appendChild(card);
                });
            };

            const filterAndRender = () => {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const filtered = uniqueQuotes.filter(quote => 
                    quote.text.toLowerCase().includes(searchTerm) ||
                    quote.author.toLowerCase().includes(searchTerm)
                );
                renderQuotes(filtered);
            };

            const showRandomQuote = () => {
                const randomIndex = Math.floor(Math.random() * uniqueQuotes.length);
                searchInput.value = ''; // Clear search field
                renderQuotes([uniqueQuotes[randomIndex]]);
            };

            // -- EVENT LISTENERS --
            searchInput.addEventListener('input', filterAndRender);
            randomBtn.addEventListener('click', showRandomQuote);

            // -- INITIAL RENDER --
            renderQuotes(uniqueQuotes);
        });
    </script>
</body>
</html>
